<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<div class="auth-container">
<img src="photos/logo.png" class="auth-logo">
<h2>Create Account</h2>
<form id="signupForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirmPassword" placeholder="Confirm
Password" required>
<button type="submit">Signup</button>
<p id="error"></p>
</form>
<div class="social-login">
<button class="google">Continue with Google</button>
<button class="github">Continue with GitHub</button>
<button class="facebook">Continue with Facebook</button>
</div>
</div>
<script>
const form = document.getElementById("signupForm");
form.addEventListener("submit", function(e){
e.preventDefault();
let password = document.getElementById("password").value;
let confirm = document.getElementById("confirmPassword").value;
let error = document.getElementById("error");
if(password.length < 6){
error.innerText = "Password must be at least 6 characters";
return;
}
if(password !== confirm){
error.innerText = "Passwords do not match";
return;
}
localStorage.setItem("registered", "true");
window.location.href = "login.html";
});
</script>
</body>
</html>
