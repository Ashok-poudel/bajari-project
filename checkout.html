<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="assets/css/style.css">

<!-- Khalti SDK -->
<script src="https://khalti.com/static/khalti-checkout.js"></script>
</head>
<body class="auth-page">

<div class="auth-container checkout-box">
  <img src="assets/images/photos/logo.png" class="auth-logo" alt="Bajari Store Logo">
  <h2>Select Payment Method</h2>
  <p class="checkout-total">Total: Rs <span id="total-amount">0</span></p>
  <button class="pay-btn khalti">Pay with Khalti</button>
  <button class="pay-btn esewa">Pay with eSewa</button>
  <button class="pay-btn card">Pay with Card</button>
  <button class="pay-btn cash">Cash On Delivery</button>
</div>

<script src="assets/js/script.js"></script>
<script>
async function placeOrder() {
    const response = await fetch('backend/place_order.php', {
        method: 'POST'
    });
    const result = await response.json();
    if (result.success) {
        window.location.href = 'thankyou.html';
    } else {
        alert(result.message || 'Could not complete order');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const orderId = 'ORDER' + Date.now();

    var khaltiConfig = {
        "publicKey": "test_public_key_dc74b1b5a0e64f3bb1c2c3c1b8e89f0a",
        "productIdentity": orderId,
        "productName": "Bajari Store Products",
        "productUrl": window.location.href,
        "paymentPreference": ["KHALTI", "EBANKING","MOBILE_BANKING","CONNECT_IPS","SCT"],
        "eventHandler": {
            onSuccess(payload) {
                fetch('backend/khalti_verify.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `token=${payload.token}&amount=${payload.amount}`
                })
                .then(res => res.json())
                .then(async data => {
                    if (data.status === 'success') {
                        await placeOrder();
                    } else {
                        alert('Payment verification failed!');
                        console.error(data.message);
                    }
                })
                .catch(err => {
                    alert('Error verifying payment!');
                    console.error(err);
                });
            },
            onError(error) {
                alert('Khalti Payment Failed!');
                console.error(error);
            },
            onClose() {
                console.log('Khalti widget closed');
            }
        }
    };

    var khaltiCheckout = new KhaltiCheckout(khaltiConfig);

    document.querySelector('.khalti').addEventListener('click', () => {
        const total = parseFloat(document.getElementById('total-amount').innerText) || 0;
        if (total <= 0) {
            alert('Your cart is empty.');
            return;
        }
        khaltiCheckout.show({ amount: total * 100 });
    });

    document.querySelector('.esewa').addEventListener('click', () => {
        alert('eSewa checkout will be handled on the server side after integration.');
    });

    document.querySelector('.card').addEventListener('click', () => {
        alert('Card Payment Integration Coming Soon!');
    });
});
document.querySelector('.cash').addEventListener('click', async () => {
    if (!confirm("Confirm Cash on Delivery order?")) return;
    await placeOrder();
});
</script>

</body>
</html>
